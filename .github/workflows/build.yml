name: Build & Publish

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

jobs:

  # -----------------
  # 1. Build Check + Artifact Packaging
  # -----------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew
      - name: Build all modules and collect distributable jars
        run: ./gradlew --stacktrace clean build assembleModArtifacts

      - name: Upload Forge jar
        uses: actions/upload-artifact@v4
        with:
          name: infinitymaxapi-forge-jar
          path: build/artifacts/*forge*.jar
          if-no-files-found: error

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: infinitymaxapi-fabric-jar
          path: build/artifacts/*fabric*.jar
          if-no-files-found: error

  # -----------------
  # 2. Publish Maven
  # -----------------
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------
  # 3. GitHub Release (Tag push時)
  # -----------------
  release:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: infinitymaxapi-forge-jar
          path: build/release

      - uses: actions/download-artifact@v4
        with:
          name: infinitymaxapi-fabric-jar
          path: build/release

      - uses: softprops/action-gh-release@v2
        with:
          files: build/release/*.jar
