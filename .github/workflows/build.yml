name: Build & Publish

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]

jobs:

  # -----------------
  # 1. Build Check
  # -----------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew
      - run: ./gradlew clean build

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: infinitymaxapi-jars
          path: build/libs/*.jar

  # -----------------
  # 2. Publish Maven
  # -----------------
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------
  # 3. GitHub Release (Tag push時)
  # -----------------
  release:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: infinitymaxapi-jar
          path: build/libs

      - uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
